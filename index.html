<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Porpeta's Sunny Quest</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23f4dfaa'/%3E%3Ccircle cx='32' cy='35' r='18' fill='%23fff7e8'/%3E%3Cpath d='M17 20 24 8l6 13M47 20 40 8l-6 13' fill='%23d7793a'/%3E%3Ccircle cx='25' cy='34' r='3' fill='%23323b32'/%3E%3Ccircle cx='39' cy='34' r='3' fill='%23323b32'/%3E%3Cpath d='M31 41h2l-1 3z' fill='%23d9909b'/%3E%3Cpath d='M19 24c8-6 19-6 26 0' fill='none' stroke='%23d7793a' stroke-width='7' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main id="game-shell" aria-label="Porpeta's Sunny Quest game">
      <canvas id="game-canvas" width="960" height="540" aria-label="Game playfield"></canvas>

      <button id="audio-toggle" class="audio-toggle" type="button" aria-pressed="false">Sound On</button>

      <section id="menu" class="panel" aria-live="polite">
        <p class="eyebrow">A tiny game for Porpeta</p>
        <h1>Porpeta's Sunny Quest</h1>
        <div class="title-video-frame">
          <video
            id="title-video"
            src="./assets/video/porpeta-title.mp4"
            autoplay
            muted
            loop
            playsinline
            preload="metadata"
            aria-label="Porpeta title video"
          ></video>
        </div>
        <p class="menu-copy">Sneak. Chase the red lights. Nap in the sun.</p>
        <button id="start-btn" type="button">Start</button>
        <p class="controls">Move: WASD or arrows · Sneak: Shift or B · Pounce: Space · Fullscreen: F</p>
      </section>

      <div id="hud" class="hud" hidden>
        <div class="hud-chip">
          <span id="level-label">Level 1</span>
          <strong id="objective-label">Reach the food bowl.</strong>
        </div>
        <div class="hud-chip compact">
          <span id="score-label">0/5</span>
        </div>
      </div>

      <section id="ending" class="panel ending" hidden aria-live="polite">
        <h2>Thank you for being my best friend.</h2>
        <button id="restart-btn" type="button">Play again</button>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
